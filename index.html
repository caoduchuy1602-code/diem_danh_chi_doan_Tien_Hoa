<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm Danh Chi Đoàn Thôn Tiến Hòa</title>
    <!-- Tải các thư viện core Firebase và Excel -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #d35400; 
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.6rem;
        }
        .date-box {
            text-align: center;
            font-size: 1.2rem;
            color: #2980b9;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .session-selector {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.05rem;
        }
        .session-selector select {
            padding: 6px 12px;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid #3498db;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
        }
        .toggle-container {
            text-align: right;
            margin-bottom: 15px;
        }
        .btn-toggle {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-toggle:hover {
            background-color: #95a5a6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        th, td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .stt { width: 8%; text-align: center; }
        .name { width: 50%; font-weight: 500; font-size: 1.05rem; }
        .status-group {
            width: 42%;
            display: flex;
            gap: 12px;
        }
        .btn-status {
            padding: 6px 16px;
            border: 2px solid #bdc3c7;
            background-color: #fff;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .btn-status.active-x {
            background-color: #2ecc71;
            color: white;
            border-color: #2ecc71;
            box-shadow: 0 2px 5px rgba(46,204,113,0.3);
        }
        .btn-status.active-p {
            background-color: #f1c40f;
            color: white;
            border-color: #f1c40f;
            box-shadow: 0 2px 5px rgba(241,196,15,0.3);
        }
        .action-bars {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-action {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn-save { background-color: #27ae60; color: white; }
        .btn-save:hover { background-color: #219653; }
        .btn-excel { background-color: #2980b9; color: white; }
        .btn-excel:hover { background-color: #2471a3; }
        .btn-reset { background-color: #e74c3c; color: white; max-width: 150px; }
        .btn-reset:hover { background-color: #c0392b; }
        
        .history-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #2980b9;
            border-radius: 4px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ĐIỂM DANH CHI ĐOÀN THÔN TIẾN HÒA</h2>
    <div class="date-box" id="currentDate">Ngày: --/--/----</div>
    
    <div class="session-selector">
        <label for="sessionSelect">Chọn lượt điểm danh: </label>
        <select id="sessionSelect" onchange="changeSession()">
            <option value="Lan 1">Lần 1 (Đầu buổi)</option>
            <option value="Lan 2">Lần 2 (Cuối buổi)</option>
            <option value="Sang">Buổi Sáng</option>
            <option value="Chieu">Buổi Chiều</option>
        </select>
    </div>

    <!-- Nút chức năng Ẩn/Hiện danh sách -->
    <div class="toggle-container">
        <button class="btn-toggle" id="btnToggle" onclick="toggleTableVisibility()">Ẩn Danh Sách</button>
    </div>

    <!-- Vùng bao bọc bảng danh sách -->
    <div id="tableWrapper">
        <table>
            <thead>
                <tr>
                    <th class="stt">STT</th>
                    <th class="name">Họ và Tên Đoàn Viên</th>
                    <th>Điểm danh hôm nay</th>
                </tr>
            </thead>
            <tbody id="memberList">
                <tr><td colspan="3" style="text-align:center;">Đang tải dữ liệu đám mây...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="history-box" id="historyStatus">
        Dữ liệu lịch sử: Đang đồng bộ với cơ sở dữ liệu trực tuyến...
    </div>

    <div class="action-bars">
        <button class="btn-action btn-save" onclick="validateOTPBeforeAction('save')">1. Lưu Lượt Này (Đám Mây)</button>
        <button class="btn-action btn-excel" onclick="exportToExcel()">2. Tải File Excel Thống Kê</button>
        <button class="btn-action btn-reset" onclick="validateOTPBeforeAction('reset')">Xóa hết lịch sử</button>
    </div>
</div>

<script>
    // == CẤU HÌNH ĐƯỜNG TRUYỀN FIREBASE ==
    const firebaseConfig = {
        apiKey: "AIzaSyDSWXvmMAsLI5u1yvcjiv7M_IW0yet-UEg",
        authDomain: "diem-danh-tien-hoa.firebaseapp.com",
        databaseURL: "https://diem-danh-tien-hoa-default-rtdb.firebaseio.com",
        projectId: "diem-danh-tien-hoa",
        storageBucket: "diem-danh-tien-hoa.firebasestorage.app",
        messagingSenderId: "767668395362",
        appId: "1:767668395362:web:2f6846fa92be3725c7603b"
    };

    // Khởi tạo app
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // CÀI ĐẶT MÃ OTP BẢO MẬT (Bạn có thể sửa chuỗi số này theo ý mình)
    const SECRET_OTP_CODE = "190590";

    // Danh sách 42 Đoàn viên Chi Đoàn thôn Tiến Hòa
    const members = [
        "Nguyễn Trần Thảo Nguyên", "Trần Văn Sáng", "Lê Minh Thiều", "Kiều Đình Nam",
        "Nguyễn Diệp Tú", "Trần Hữu Thịnh", "Hoàng Khánh Ngọc", "Cao Đức Huy",
        "Nguyễn Thị Quỳnh Nhi", "Lê Nguyễn Minh Hằng", "Lê Minh Đăng", "Phạm Thị Thu Hiền",
        "Nguyễn Anh Dũng", "Nguyễn Hà Linh", "Nguyễn Bảo Nam", "Nguyễn Lê Đăng Đán",
        "Nguyễn Đức Huy", "Đinh Gia Như", "Lương Viết Dũng", "Phan Viết Hào",
        "Nguyễn Hoài Nam", "Lương Viết Thành", "Phan Khánh Linh", "Nguyễn Tuấn Sang",
        "Nguyễn Ngọc Ánh", "Nguyễn Hoàng Gia Bảo", "Trần Anh Duy", "Vũ Uyên Ly",
        "Đinh Phương Bắc", "Lê Thảo My", "Lê Trà My", "Nguyễn Viết Đề",
        "Nguyễn Đăng Duy", "Nguyễn Thị Quỳnh Loan", "Lê Minh Thắng", "Nguyễn Bảo Thi",
        "Trần Minh Hưng", "Phạm Phương Vy", "Nguyễn Anh Quốc", "Bùi Mai Phương",
        "Nguyễn Ngọc Hà", "Nguyễn Thị Thanh Hòa"
    ];

    let baseDateStr = ""; 
    let currentKeyStr = ""; 
    let attendanceHistory = {};
    let todayAttendance = {};
    let isTableVisible = true;

    // Biến quản lý trạng thái sai mã OTP
    let wrongCount = 0;
    let isLocked = false;

    // Thiết lập ngày tháng năm hiện tại hệ thống
    function initDate() {
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        baseDateStr = `${dd}-${mm}-${yyyy}`;
        
        document.getElementById('currentDate').innerText = `Hôm nay: ${dd}/${mm}/${yyyy}`;
        updateCurrentKey();
    }

    function updateCurrentKey() {
        const session = document.getElementById('sessionSelect').value;
        currentKeyStr = `${baseDateStr}_${session}`;
    }

    // Khi thay đổi lượt (Lần 1, Lần 2, Sáng, Chiều) trên giao diện
    function changeSession() {
        updateCurrentKey();
        members.forEach(name => {
            todayAttendance[name] = (attendanceHistory[name] && attendanceHistory[name][currentKeyStr]) || "";
        });
        renderMemberList();
    }

    // Lắng nghe dữ liệu thay đổi trực tiếp từ Firebase đám mây
    function listenToFirebase() {
        database.ref('attendance_history').on('value', (snapshot) => {
            attendanceHistory = snapshot.val() || {};
            
            members.forEach(name => {
                if (!attendanceHistory[name]) {
                    attendanceHistory[name] = {};
                }
                todayAttendance[name] = attendanceHistory[name][currentKeyStr] || "";
            });

            updateHistoryStatus();
            renderMemberList();
        });
    }

    // Hiển thị trạng thái các phiên đã lưu dưới thanh lịch sử
    function updateHistoryStatus() {
        const sampleName = members[0];
        const savedKeys = Object.keys(attendanceHistory[sampleName] || {});
        if(savedKeys.length > 0) {
            let displayKeys = savedKeys.map(k => {
                let parts = k.split('_');
                let dateFormatted = parts[0].replace(/-/g, '/');
                let sessionText = parts[1] === "Lan 1" ? "Lần 1" : parts[1] === "Lan 2" ? "Lần 2" : parts[1] === "Sang" ? "Sáng" : "Chiều";
                return `${dateFormatted} (${sessionText})`;
            });
            document.getElementById('historyStatus').innerText = `Đám mây online đang lưu dữ liệu của ${savedKeys.length} lượt: [${displayKeys.join(", ")}]. Máy tính và điện thoại đã đồng bộ!`;
        } else {
            document.getElementById('historyStatus').innerText = "Chưa có dữ liệu lịch sử trên đám mây. Hãy tiến hành điểm danh!";
        }
    }

    // Đổ danh sách Đoàn viên ra bảng biểu HTML
    function renderMemberList() {
        const tbody = document.getElementById('memberList');
        tbody.innerHTML = "";

        members.forEach((name, index) => {
            const currentStatus = todayAttendance[name];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="stt">${index + 1}</td>
                <td class="name">${name}</td>
                <td>
                    <div class="status-group">
                        <button class="btn-status ${currentStatus === 'X' ? 'active-x' : ''}" onclick="toggleStatus('${name}', 'X')">X</button>
                        <button class="btn-status ${currentStatus === 'P' ? 'active-p' : ''}" onclick="toggleStatus('${name}', 'P')">P</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Đổi qua lại trạng thái đi học (X) hoặc có phép (P)
    function toggleStatus(name, status) {
        if (todayAttendance[name] === status) {
            todayAttendance[name] = ""; 
        } else {
            todayAttendance[name] = status;
        }
        renderMemberList();
    }

    // Đóng/Mở bảng danh sách đoàn viên
    function toggleTableVisibility() {
        const tableWrapper = document.getElementById('tableWrapper');
        const btnToggle = document.getElementById('btnToggle');
        
        if (isTableVisible) {
            tableWrapper.style.display = 'none';
            btnToggle.innerText = 'Hiện Danh Sách';
            isTableVisible = false;
        } else {
            tableWrapper.style.display = 'block';
            btnToggle.innerText = 'Ẩn Danh Sách';
            isTableVisible = true;
        }
    }

    // == LOGIC KIỂM TRA MÃ OTP VÀ GIỚI HẠN SAI QUÁ 3 LẦN ==
    function validateOTPBeforeAction(actionType) {
        // Nếu hệ thống đã bị khóa do cố tình nhập sai quá nhiều
        if (isLocked) {
            alert("🔒 Tính năng này đã bị khóa do nhập sai OTP quá 3 lần.Chúc bạn may mắn lần sau ^^");
            return;
        }

        const userOTP = prompt(`XÁC THỰC BẢO MẬT: Nhập mã OTP để thực hiện (Đã sai: ${wrongCount}/3 lần):`);
        
        if (userOTP === null) return; // Nhấn hủy lệnh

        if (userOTP === SECRET_OTP_CODE) {
            wrongCount = 0; // Đặt lại bộ đếm nếu nhập chuẩn xác
            if (actionType === 'save') {
                executeSaveData();
            } else if (actionType === 'reset') {
                executeResetData();
            }
        } else {
            wrongCount++;
            if (wrongCount >= 3) {
                isLocked = true;
                alert("❌ Bạn đã nhập sai mã OTP 3 lần liên tiếp! Chức năng lưu/xóa dữ liệu đã bị KHÓA CỨNG.");
            } else {
                alert(`❌ Mã OTP nhập vào không chính xác! Bạn còn ${3 - wrongCount} lần thử.`);
            }
        }
    }

    // Thực hiện đẩy dữ liệu lên Firebase
    function executeSaveData() {
        const sessionLabel = document.getElementById('sessionSelect').options[document.getElementById('sessionSelect').selectedIndex].text;
        
        members.forEach(name => {
            attendanceHistory[name][currentKeyStr] = todayAttendance[name];
        });
        
        database.ref('attendance_history').set(attendanceHistory)
            .then(() => {
                alert(`Đã ĐỒNG BỘ dữ liệu điểm danh lượt [ ${sessionLabel} ] lên đám mây thành công!`);
            })
            .catch((error) => {
                alert("Lỗi kết nối đồng bộ: " + error.message);
            });
    }

    // Thực hiện lệnh clear trắng database
    function executeResetData() {
        if(confirm("CẢNH BÁO CUỐI: Bạn có thực sự chắc chắn muốn XÓA SẠCH lịch sử không?")) {
            database.ref('attendance_history').remove()
                .then(() => {
                    alert("Đã xóa sạch toàn bộ dữ liệu lịch sử đám mây.");
                })
                .catch((error) => {
                    alert("Lỗi khi thực thi xóa: " + error.message);
                });
        }
    }

    // Tạo file Excel báo cáo tổng hợp xuất ra máy tính/điện thoại
    function exportToExcel() {
        let allKeys = new Set();
        members.forEach(name => {
            Object.keys(attendanceHistory[name] || {}).forEach(key => allKeys.add(key));
        });
        let sortedKeys = Array.from(allKeys).sort();

        let excelRows = [];

        members.forEach((name, index) => {
            let rowData = {
                "STT": index + 1,
                "Họ và Tên": name
            };
            sortedKeys.forEach(key => {
                let parts = key.split('_');
                let dateHeader = parts[0].replace(/-/g, '/');
                let sessionHeader = parts[1] === "Lan 1" ? "Lần 1" : parts[1] === "Lan 2" ? "Lần 2" : parts[1] === "Sang" ? "Sáng" : "Chiều";
                
                let excelColumnName = `${dateHeader} (${sessionHeader})`;
                rowData[excelColumnName] = (attendanceHistory[name] && attendanceHistory[name][key]) || ""; 
            });
            excelRows.push(rowData);
        });

        if(excelRows.length === 0 || sortedKeys.length === 0) {
            alert("Chưa ghi nhận dữ liệu lịch sử nào trên cloud để xuất file Excel!");
            return;
        }

        const worksheet = XLSX.utils.json_to_sheet(excelRows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Tổng Hợp Điểm Danh");
        XLSX.writeFile(workbook, `DiemDanh_ChiDoan_ThonTienHoa.xlsx`);
    }

    // Khởi chạy khi tải trang hoàn tất
    window.onload = function() {
        initDate();
        listenToFirebase();
    };
</script>

</body>
</html>
